# Development stack: hot reload for backend (nodemon) + frontend (vite),
# plus a local MongoDB. From the repo root: `docker compose up --build`.
# Polling is enabled so hot reload works on Windows/WSL2 (and is harmless on Linux).
services:
  mongo:
    image: mongo:7
    container_name: spotify-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: spotify-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"                 # must match PORT in backend/.env
    volumes:
      - ./backend:/app              # live code
      - /app/node_modules           # keep the image's node_modules
    command: npm run dev -- -L      # nodemon, -L = polling watch (needed on Windows)
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: spotify-frontend
    restart: unless-stopped
    environment:
      - VITE_USE_POLLING=true       # turns on vite's polling watcher (see vite.config.ts)
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend

volumes:
  mongo-data:
